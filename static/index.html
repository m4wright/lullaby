<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Critical for mobile layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <!-- Scrollable Song List -->
        <header class="app-header">
            <h2>Song Library</h2>
        </header>

        <main class="song-list-container">
            <ul id="song-list" class="song-list">
                <!-- Songs populated by JavaScript -->
            </ul>
        </main>

        <!-- Fixed Bottom Player Bar -->
        <footer class="music-player">

            <!-- Volume Control -->
            <div class="volume-control-row">
                <span class="volume-icon">🔊</span>
                <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="100">
                <span id="volume-display" class="volume-display">100%</span>
                <span id="timer-display" class="timer-display" title="Click to configure inactivity timer">⏱ --:--</span>
            </div>

            <div class="player-controls-row">

                <div class="controls">
                    <button id="prev-btn" class="control-btn">⏮</button>
                    <button id="play-pause-btn" class="control-btn play-pause">⏯</button>
                    <button id="next-btn" class="control-btn">⏭</button>
                </div>
            </div>
        </footer>

    </div>

    <!-- Inactivity Timer Settings Modal -->
    <div id="timer-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Inactivity Timer</h3>
                <button id="timer-modal-close" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="timer-setting">
                    <label class="checkbox-label">
                        <input type="checkbox" id="timer-enabled-checkbox">
                        Enable inactivity timer
                    </label>
                </div>
                <div class="timer-setting">
                    <label for="timer-duration-select">Timeout duration:</label>
                    <select id="timer-duration-select" class="timer-duration-select">
                        <option value="5">5 minutes</option>
                        <option value="10">10 minutes</option>
                        <option value="15">15 minutes</option>
                        <option value="30">30 minutes</option>
                        <option value="45">45 minutes</option>
                        <option value="60">60 minutes</option>
                    </select>
                </div>
                <div class="timer-status">
                    <span id="timer-status-text">Status: Inactive</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
