<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Management - Lullabies</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Management-specific styles */
        .management-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #2a2a2a;
        }

        .back-link {
            color: #1db954;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .add-song-form {
            padding: 16px;
            background: #202020;
            margin: 16px;
            border-radius: 10px;
        }

        .add-song-form h3 {
            margin-bottom: 12px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            opacity: 0.8;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1db954;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.15s ease;
        }

        .btn-primary {
            background: #1db954;
            color: #000;
        }

        .btn-primary:hover {
            background: #1ed760;
        }

        .btn-danger {
            background: #e91429;
            color: #fff;
        }

        .btn-danger:hover {
            background: #ff3344;
        }

        .btn-secondary {
            background: #3a3a3a;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #4a4a4a;
        }

        .song-table-container {
            padding: 0 16px 16px;
            overflow-x: auto;
        }

        .song-table {
            width: 100%;
            border-collapse: collapse;
        }

        .song-table th {
            text-align: left;
            padding: 12px;
            background: #202020;
            font-size: 13px;
            opacity: 0.8;
        }

        .song-table td {
            padding: 12px;
            border-bottom: 1px solid #2a2a2a;
            font-size: 14px;
        }

        .song-table tr:hover {
            background: #202020;
        }

        .song-table .actions {
            display: flex;
            gap: 8px;
        }

        .edit-row input {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            padding: 6px 10px;
            border-radius: 4px;
            color: #fff;
            width: 100%;
        }

        .status-message {
            padding: 10px 16px;
            margin: 0 16px 16px;
            border-radius: 6px;
            font-size: 14px;
        }

        .status-success {
            background: #1db954;
            color: #000;
        }

        .status-error {
            background: #e91429;
            color: #fff;
        }

        .hidden {
            display: none;
        }

        @media (min-width: 768px) {
            .song-table td:nth-child(1),
            .song-table td:nth-child(2) {
                min-width: 200px;
            }

            .song-table td:nth-child(3) {
                min-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="management-header">
            <h2>Song Management</h2>
            <a href="index.html" class="back-link">&larr; Back to Player</a>
        </header>

        <div id="status-message" class="status-message hidden"></div>

        <div class="add-song-form">
            <h3>Add New Song</h3>
            <form id="add-song-form">
                <div class="form-group">
                    <label for="song-name">Song Name</label>
                    <input type="text" id="song-name" required>
                </div>
                <div class="form-group">
                    <label for="song-artist">Artist</label>
                    <input type="text" id="song-artist" required>
                </div>
                <div class="form-group">
                    <label for="song-path">File Path</label>
                    <input type="text" id="song-path" required>
                </div>
                <button type="submit" class="btn btn-primary">Add Song</button>
            </form>
        </div>

        <div class="song-table-container">
            <table class="song-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Artist</th>
                        <th>Path</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="song-table-body">
                    <!-- Songs populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
